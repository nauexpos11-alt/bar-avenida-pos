<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Bar Avenida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      overflow: hidden;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 52px;
    }

    /* ── Marca ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .brand-bar {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.65em;
      color: #d4a017;
      text-transform: uppercase;
    }

    .brand-avenida {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #f0c842;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 0 60px rgba(212, 160, 23, 0.3);
    }

    .brand-line {
      width: 130px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4a017, transparent);
      margin-top: 6px;
    }

    /* ── Dots ── */
    .dots {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #d4a017;
      opacity: 0.15;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
      40%           { opacity: 1;    transform: scale(1.2); }
    }

    /* ── Subtítulo ── */
    .tagline {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: #444;
      text-transform: uppercase;
      margin-top: -36px;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="brand">
      <span class="brand-bar">Bar</span>
      <span class="brand-avenida">Avenida</span>
      <div class="brand-line"></div>
    </div>

    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <span class="tagline">Iniciando sistema</span>
  </div>
</body>
</html>
